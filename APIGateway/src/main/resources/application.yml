server.port: 8080
eureka.client.service-url.defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
jwt.secretKey: ${JWT_SECRET_KEY}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

spring:
  application.name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-private
          uri: ${USER_SERVICE_URI:lb://USER-SERVICE}
          predicates:
            - Path=/api/v1/users/core/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        - id: user-service
          uri: ${USER_SERVICE_URI:lb://USER-SERVICE}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2

        - id: posts-service
          uri: ${POSTS_SERVICE_URI:lb://POSTS-SERVICE}
          predicates:
            - Path=/api/v1/posts/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        - id: connections-service
          uri: ${CONNECTIONS_SERVICE_URI:lb://CONNECTIONS-SERVICE}
          predicates:
            - Path=/api/v1/connections/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        - id: intelligence-service
          uri: ${INTELLIGENCE_SERVICE_URI:lb://INTELLIGENCE-SERVICE}
          predicates:
            - Path=/api/v1/intelligence/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter

        - id: uploader-service
          uri: ${UPLOADER_SERVICE_URI:lb://UPLOADER-SERVICE}
          predicates:
            - Path=/api/v1/uploads/**
          filters:
            - StripPrefix=2
            - name: AuthenticationFilter