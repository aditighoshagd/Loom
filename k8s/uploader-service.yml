apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader-service
spec:
  selector:
    matchLabels:
      app: uploader-service
  template:
    metadata:
      labels:
        app: uploader-service
    spec:
      containers:
      - name: uploader-service
        image: yourdockerhub/loom-app-uploader-service
        resources:
          limits:
            memory: "400Mi"
            cpu: "200m"
          requests:
            memory: "200Mi"
            cpu: "100m"
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s
          - name: CLOUDINARY_CLOUD_NAME
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: CLOUDINARY_CLOUD_NAME
          - name: CLOUDINARY_API_KEY
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: CLOUDINARY_API_KEY
          - name: CLOUDINARY_API_SECRET
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: CLOUDINARY_API_SECRET
          - name: GCLOUD_STORAGE_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: GCLOUD_STORAGE_BUCKET_NAME
          - name: GCLOUD_CREDENTIALS_JSON
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: GCLOUD_CREDENTIALS_JSON
        ports:
        - containerPort: 9050

---

apiVersion: v1
kind: Service
metadata:
  name: uploader-service
spec:
  selector:
    app: uploader-service
  ports:
  - port: 80
    targetPort: 9050
