apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligence-service
spec:
  selector:
    matchLabels:
      app: intelligence-service
  template:
    metadata:
      labels:
        app: intelligence-service
    spec:
      containers:
      - name: intelligence-service
        image: aditiighosh/loom-app-intelligence-service
        resources:
          limits:
            memory: "400Mi"
            cpu: "200m"
          requests:
            memory: "200Mi"
            cpu: "100m"
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: OPENAI_API_KEY
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: POSTS_DB_USERNAME
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: loom-secrets
                key: POSTS_DB_PASSWORD
        ports:
        - containerPort: 9012

---

apiVersion: v1
kind: Service
metadata:
  name: intelligence-service
spec:
  selector:
    app: intelligence-service
  ports:
  - port: 80
    targetPort: 9012
