apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  labels:
    name: myingress
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "true"
spec:
  rules:
  - http:
      paths:
      - path: "/api/v1"
        pathType: Prefix
        backend:
          service: 
            name: api-gateway
            port: 
              number: 80
      - path: "/"
        pathType: Prefix
        backend:
          service: 
            name: frontend
            port: 
              number: 80