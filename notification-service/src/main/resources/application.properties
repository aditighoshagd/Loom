spring.application.name=notification-service

server.port = 9040
server.servlet.context-path=/notifications

spring.datasource.url=${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/notificationDB}
spring.datasource.username=${NOTIFICATION_DB_USERNAME:postgres}
spring.datasource.password=${NOTIFICATION_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}